<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Cognition Archive</title>
    <!-- FontAwesomeの読み込み -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <div id="start-screen" class="screen active fade-in">
            <h1><i class="fas fa-satellite-dish"></i> Deep Cognition Archive</h1>
            <p>対象者の情報代謝・深層認知プロセスを観測します。</p>
            <p><i class="fas fa-user-secret"></i> <span>※回答内容だけでなく、迷った時間や行動ログも計測されます。</span></p>
            <button id="start-btn"><i class="fas fa-play"></i> 観測を開始する</button>
        </div>

        <div id="question-screen" class="screen">
            <div class="progress"><i class="fas fa-list"></i> Log: <span id="current-q">1</span> / <span id="total-q"></span></div>
            <h2 id="question-text">質問</h2>
            
            <div id="media-area"></div> <!-- 抽象画像などを出すエリア -->
            <div id="input-area" class="slide-up"></div>

            <div class="options-area slide-up">
                <div class="confidence-box">
                    <label for="confidence"><i class="fas fa-sliders-h"></i> 回答の確信度:</label>
                    <input type="range" id="confidence" min="1" max="10" value="5">
                </div>
                <button id="ambiguous-btn" class="sub-btn"><i class="fas fa-exclamation-triangle"></i> 質問の定義が曖昧 / 答えられない</button>
            </div>

            <div class="nav-buttons slide-up">
                <button id="prev-btn"><i class="fas fa-undo"></i> 戻る (再検証)</button>
                <button id="next-btn">次へ <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div id="result-screen" class="screen fade-in">
            <h1><i class="fas fa-poll"></i> 観測完了</h1>
            <div class="result-box">
                <h2>ソシオニクス: <span id="socio-type"></span></h2>
                <h3>サブタイプ: <span id="socio-sub"></span> / DCNH: <span id="dcnh-type"></span></h3>
                <p>推定MBTI: <span id="mbti-type"></span> - <span id="a-t-type"></span></p>
                <p id="socio-desc" style="font-size: 0.9em; color: #8b949e;"></p>
            </div>
            <div class="chart-container">
                            <!-- レーダーチャート -->
                            <canvas id="function-chart"></canvas>
                        </div>
                        <div class="chart-container" style="margin-top: 20px;">
                            <!-- ★棒グラフを追加！ -->
                            <canvas id="bar-chart"></canvas>
                        </div>
            <div class="log-box">
                <h3><i class="fas fa-terminal"></i> [System Log] 認知プロセスの特徴</h3>
                <p id="behavior-log"></p>
            </div>
            <button onclick="location.reload()"><i class="fas fa-redo"></i> 再診断</button>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
